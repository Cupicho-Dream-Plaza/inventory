<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CUPICHO PRO V6.5</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body { background-color: #020617; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent;}
    .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(12px); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(15px); z-index: 50; display: flex; flex-direction: column; padding: 24px; animation: slideUp 0.3s ease-out; overflow-y: auto;}
    @keyframes slideUp { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .flash-active { animation: flash 0.3s ease-out; }
    @keyframes flash { 0% { background: rgba(251, 191, 36, 0.5); } 100% { background: transparent; } }
    select { text-overflow: ellipsis; }
    .cursor-pointer { cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyA7636rgPhQNCM8V9mgG6uCxKTxpBU7v70",
      authDomain: "cupicho-inventory.firebaseapp.com",
      projectId: "cupicho-inventory",
      storageBucket: "cupicho-inventory.firebasestorage.app",
      messagingSenderId: "1079825488345",
      appId: "1:1079825488345:web:b0446ca4f7ef83675461c8",
      measurementId: "G-9J582TMT6L"
    };

    let db = null;
    if (firebaseConfig) {
      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
      } catch(e) { console.error("Firebase Error", e); }
    }

    const LOCATIONS = [
      "辦公室", "梯間", "櫃檯區", "Anthon Berg (展示桌+珠寶櫃+壁櫃)", "DOMORI (展示桌+珠寶櫃+壁櫃)",
      "Best Selling", "Gifts A", "Gifts B", "Elit", "Baci", "Belgian+Hamlet", "Caffarel+Guylian",
      "片裝牆", "Ruta", "Mieszko", "酒區", "中島A", "中島B", "中島C", "中島D", 
      "展示桌A(散巧前方)", "展示桌B(主視覺)", "展示桌C(長桌)"
    ];

    function App() {
      const [masterData, setMasterData] = useState(() => JSON.parse(localStorage.getItem('cup_master')) || []);
      const [inventory, setInventory] = useState(() => JSON.parse(localStorage.getItem('cup_inv')) || []);
      const [manualBinds, setManualBinds] = useState(() => JSON.parse(localStorage.getItem('cup_binds')) || {});
      const [completedLocations, setCompletedLocations] = useState(() => JSON.parse(localStorage.getItem('cup_completed_locs')) || []);
      const [currentLocation, setCurrentLocation] = useState(LOCATIONS[0]);
      
      const [scannedBarcode, setScannedBarcode] = useState('');
      const [currentItem, setCurrentItem] = useState(null); 
      const [qty, setQty] = useState(1);
      const [feedback, setFeedback] = useState('');
      
      const scannerRef = useRef(null);
      const fileInputRef = useRef(null);

      const [showAdmin, setShowAdmin] = useState(false);
      const [showSummary, setShowSummary] = useState(false);
      const [unknownBarcode, setUnknownBarcode] = useState(null); 
      const [searchQuery, setSearchQuery] = useState('');
      const [newProductName, setNewProductName] = useState('');

      const dataRef = useRef({ masterData, manualBinds, inventory, currentLocation });
      useEffect(() => { 
        dataRef.current = { masterData, manualBinds, inventory, currentLocation }; 
      }, [masterData, manualBinds, inventory, currentLocation]);

      // 🌐 雲端同步
      useEffect(() => {
        if (!db) return;
        const unsubscribe = db.collection('inventory_sessions').doc('current').onSnapshot((doc) => {
            if (doc.exists) {
                const cloudData = doc.data().items || [];
                setInventory(cloudData);
                localStorage.setItem('cup_inv', JSON.stringify(cloudData));
            }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => { localStorage.setItem('cup_master', JSON.stringify(masterData)); }, [masterData]);
      useEffect(() => { localStorage.setItem('cup_binds', JSON.stringify(manualBinds)); }, [manualBinds]);
      useEffect(() => { localStorage.setItem('cup_completed_locs', JSON.stringify(completedLocations)); }, [completedLocations]);
      
      const saveInventory = (newInv) => {
        setInventory(newInv);
        localStorage.setItem('cup_inv', JSON.stringify(newInv));
        if (db) {
            db.collection('inventory_sessions').doc('current').set({ 
                items: newInv, 
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp() 
            }).catch(e => console.error("雲端同步失敗", e));
        }
      };

      // 修正：增加自動盤點邏輯
      const autoAddRecord = (code) => {
        const { masterData, manualBinds, inventory, currentLocation } = dataRef.current;
        const found = masterData.find(m => String(m.barcode) === code) || manualBinds[code];
        const item = found || { id: "NEW", name: "未知商品" };
        
        let newInv = [...inventory];
        const existingIdx = newInv.findIndex(i => i.barcode === code && i.location === currentLocation);

        if (existingIdx > -1) {
            newInv[existingIdx].qty += 1;
            newInv[existingIdx].time = new Date().toLocaleTimeString();
            const updatedItem = newInv.splice(existingIdx, 1)[0];
            newInv.unshift(updatedItem);
            setFeedback(`✅ 自動累加: ${item.name}`);
        } else {
            newInv.unshift({ ...item, barcode: code, qty: 1, location: currentLocation, time: new Date().toLocaleTimeString() });
            setFeedback(`✅ 自動新增: ${item.name}`);
        }
        
        saveInventory(newInv);
        setTimeout(() => setFeedback(''), 2000);

        if (!found) {
            setUnknownBarcode(code);
        }
      };

      const startScanner = async () => {
        const gate = document.getElementById('cam-gate');
        if (gate) gate.style.display = 'none';

        if (!scannerRef.current) scannerRef.current = new Html5Qrcode("reader");
        
        try {
          await scannerRef.current.start(
            { facingMode: "environment" },
            { 
              fps: 10, // iOS 穩定度優化
              qrbox: { width: 280, height: 160 },
              aspectRatio: 1.0,
              videoConstraints: { facingMode: "environment" } // 強制 iOS 使用後鏡頭
            },
            (decodedText) => {
               const f = document.getElementById('flash-overlay');
               if(f) { f.classList.add('flash-active'); setTimeout(() => f.classList.remove('flash-active'), 300); }
               if (navigator.vibrate) navigator.vibrate(80);
               
               const code = String(decodedText).trim();
               setScannedBarcode(code);
               
               // 掃描即確認
               autoAddRecord(code);
            }
          );
        } catch (err) { 
            alert("相機啟動失敗 (iOS 需確認權限)：" + err); 
            if (gate) gate.style.display = 'flex';
        }
      };

      const handleManualInput = (code) => {
          setScannedBarcode(code);
          const found = masterData.find(m => String(m.barcode) === code) || manualBinds[code];
          setCurrentItem(found || null);
      };

      const handleAddRecord = () => {
        if (!scannedBarcode || isNaN(qty)) return;
        const item = currentItem || { id: "NEW", name: "未知商品" };
        const existingIdx = inventory.findIndex(i => i.barcode === scannedBarcode && i.location === currentLocation);
        let newInv = [...inventory];
        
        if (existingIdx > -1) {
            newInv[existingIdx].qty += qty;
            newInv[existingIdx].time = new Date().toLocaleTimeString();
            const updatedItem = newInv.splice(existingIdx, 1)[0];
            newInv.unshift(updatedItem);
        } else {
            newInv.unshift({ ...item, barcode: scannedBarcode, qty, location: currentLocation, time: new Date().toLocaleTimeString() });
        }
        
        saveInventory(newInv);
        setFeedback(`✅ 已送出: ${item.name}`);
        setScannedBarcode('');
        setCurrentItem(null); 
        setQty(1);
        setTimeout(() => setFeedback(''), 2000);
      };

      // 修正：刪除本次盤點資料按鈕
      const handleDeleteCurrentSession = () => {
        if (confirm("⚠️ 確定要刪除本次所有的盤點資料嗎？此操作無法恢復。")) {
            saveInventory([]);
            alert("盤點資料已清空");
        }
      };

      const toggleLocationComplete = () => {
        if (completedLocations.includes(currentLocation)) {
          setCompletedLocations(completedLocations.filter(loc => loc !== currentLocation));
        } else {
          setCompletedLocations([...completedLocations, currentLocation]);
        }
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Papa.parse(file, {
            header: true, skipEmptyLines: true,
            complete: function(res) {
                const parsed = res.data.map(i => ({
                    id: String(i['商品碼'] || '0'),
                    name: String(i['商品名稱規格'] || '未知'),
                    barcode: String(i['條碼'] || '').replace(/\s+/g, '').replace(/\.0$/, '')
