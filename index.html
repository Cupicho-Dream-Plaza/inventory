<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CUPICHO PRO V6.3</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body { background-color: #020617; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent;}
    .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(12px); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(15px); z-index: 50; display: flex; flex-direction: column; padding: 24px; animation: slideUp 0.3s ease-out; overflow-y: auto;}
    @keyframes slideUp { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .flash-active { animation: flash 0.3s ease-out; }
    @keyframes flash { 0% { background: rgba(251, 191, 36, 0.5); } 100% { background: transparent; } }
    select { text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = null; 
    let db = null;
    if (firebaseConfig) {
      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
      } catch(e) { console.error("Firebase Error", e); }
    }

    const LOCATIONS = [
      "辦公室", "梯間", "櫃檯區", "Anthon Berg (展示桌+珠寶櫃+壁櫃)", "DOMORI (展示桌+珠寶櫃+壁櫃)",
      "Best Selling", "Gifts A", "Gifts B", "Elit", "Baci", "Belgian+Hamlet", "Caffarel+Guylian",
      "片裝牆", "Ruta", "Mieszko", "酒區", "中島A", "中島B", "中島C", "中島D", 
      "展示桌A(散巧前方)", "展示桌B(主視覺)", "展示桌C(長桌)"
    ];

    function App() {
      const [masterData, setMasterData] = useState(() => JSON.parse(localStorage.getItem('cup_master')) || []);
      const [inventory, setInventory] = useState(() => JSON.parse(localStorage.getItem('cup_inv')) || []);
      const [manualBinds, setManualBinds] = useState(() => JSON.parse(localStorage.getItem('cup_binds')) || {});
      const [completedLocations, setCompletedLocations] = useState(() => JSON.parse(localStorage.getItem('cup_completed_locs')) || []);
      const [currentLocation, setCurrentLocation] = useState(LOCATIONS[0]);
      
      const [scannedBarcode, setScannedBarcode] = useState('');
      const [currentItem, setCurrentItem] = useState(null); // ✅ 新增：用來記錄目前掃到的商品
      const [qty, setQty] = useState(1);
      const [feedback, setFeedback] = useState('');
      
      const scannerRef = useRef(null);
      const fileInputRef = useRef(null);

      const [showAdmin, setShowAdmin] = useState(false);
      const [showSummary, setShowSummary] = useState(false);
      const [unknownBarcode, setUnknownBarcode] = useState(null); 
      const [searchQuery, setSearchQuery] = useState('');
      const [newProductName, setNewProductName] = useState('');

      const dataRef = useRef({ masterData, manualBinds });
      useEffect(() => { dataRef.current = { masterData, manualBinds }; }, [masterData, manualBinds]);

      useEffect(() => { localStorage.setItem('cup_master', JSON.stringify(masterData)); }, [masterData]);
      useEffect(() => { localStorage.setItem('cup_binds', JSON.stringify(manualBinds)); }, [manualBinds]);
      useEffect(() => { localStorage.setItem('cup_completed_locs', JSON.stringify(completedLocations)); }, [completedLocations]);
      useEffect(() => { 
        localStorage.setItem('cup_inv', JSON.stringify(inventory)); 
        if (db && inventory.length > 0) {
           db.collection('inventory_sessions').doc('current').set({ items: inventory, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }).catch(e=>console.error(e));
        }
      }, [inventory]);

      const startScanner = async () => {
        const gate = document.getElementById('cam-gate');
        if (gate) gate.style.display = 'none';

        if (!scannerRef.current) scannerRef.current = new Html5Qrcode("reader");
        
        try {
          await scannerRef.current.start(
            { facingMode: "environment" },
            { fps: 30, qrbox: { width: 280, height: 160 }, aspectRatio: 1.0 },
            (decodedText) => {
               const f = document.getElementById('flash-overlay');
               if(f) { f.classList.add('flash-active'); setTimeout(() => f.classList.remove('flash-active'), 300); }
               if (navigator.vibrate) navigator.vibrate(80);
               
               const code = String(decodedText).trim();
               setScannedBarcode(code);
               
               const { masterData, manualBinds } = dataRef.current;
               const found = masterData.find(m => String(m.barcode) === code) || manualBinds[code];
               
               setCurrentItem(found || null); // ✅ 即時更新品名看板

               if (!found) {
                 setUnknownBarcode(code);
                 setSearchQuery('');
                 setNewProductName('');
               }
            }
          );
        } catch (err) { 
            alert("啟動相機失敗：" + err); 
            if (gate) gate.style.display = 'flex';
        }
      };

      // 手動輸入條碼時，即時搜尋品名
      const handleManualInput = (code) => {
          setScannedBarcode(code);
          const found = masterData.find(m => String(m.barcode) === code) || manualBinds[code];
          setCurrentItem(found || null);
      };

      const handleAddRecord = () => {
        if (!scannedBarcode || isNaN(qty)) return;
        const item = currentItem || { id: "NEW", name: "未知商品" };
        const existingIdx = inventory.findIndex(i => i.barcode === scannedBarcode && i.location === currentLocation);
        let newInv = [...inventory];
        
        if (existingIdx > -1) {
            newInv[existingIdx].qty += qty;
            newInv[existingIdx].time = new Date().toLocaleTimeString();
            const updatedItem = newInv.splice(existingIdx, 1)[0];
            newInv.unshift(updatedItem);
            setFeedback(`✅ 已累加: ${item.name}`);
        } else {
            newInv.unshift({ ...item, barcode: scannedBarcode, qty, location: currentLocation, time: new Date().toLocaleTimeString() });
            setFeedback(`✅ 已新增: ${item.name}`);
        }
        
        setInventory(newInv);
        setScannedBarcode('');
        setCurrentItem(null); // ✅ 送出後重置看板
        setQty(1);
        setTimeout(() => setFeedback(''), 2500);
      };

      const toggleLocationComplete = () => {
        if (completedLocations.includes(currentLocation)) {
          setCompletedLocations(completedLocations.filter(loc => loc !== currentLocation));
        } else {
          setCompletedLocations([...completedLocations, currentLocation]);
        }
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Papa.parse(file, {
            header: true, skipEmptyLines: true,
            complete: function(res) {
                const parsed = res.data.map(i => ({
                    id: String(i['商品碼'] || '0'),
                    name: String(i['商品名稱規格'] || '未知'),
                    barcode: String(i['條碼'] || '').replace(/\s+/g, '').replace(/\.0$/, '')
                })).filter(i => i.barcode);
                setMasterData(parsed);
                alert(`成功匯入 ${parsed.length} 筆最新商品資料！`);
                setShowAdmin(false);
                if (fileInputRef.current) fileInputRef.current.value = ""; 
            }
        });
      };

      const triggerFileInput = () => {
        if (fileInputRef.current) fileInputRef.current.click();
      };

      const bindExisting = (item) => {
        setManualBinds({ ...manualBinds, [unknownBarcode]: { id: item.id, name: item.name } });
        setCurrentItem({ id: item.id, name: item.name }); // ✅ 綁定後立即顯示品名
        setUnknownBarcode(null);
      };

      const bindNewProduct = () => {
        if(!newProductName) return alert("請輸入全新的商品名稱！");
        setManualBinds({ ...manualBinds, [unknownBarcode]: { id: "NEW", name: newProductName } });
        setCurrentItem({ id: "NEW", name: newProductName }); // ✅ 新增後立即顯示品名
        setUnknownBarcode(null);
        alert(`已成功建立新品：${newProductName}`);
      };

      return (
        <div className="flex flex-col min-h-screen">
          <div id="flash-overlay" className="fixed inset-0 pointer-events-none z-[1100]"></div>

          <header className="p-4 flex justify-between items-center bg-slate-950 border-b border-slate-900 sticky top-0 z-[100]">
              <div>
                  <h1 className="text-xl font-black text-yellow-500 italic leading-none">CUPICHO</h1>
                  <p className="text-[9px] font-bold uppercase tracking-widest mt-1 text-slate-500">
                    主檔: {masterData.length} 筆
                  </p>
              </div>
              <button onClick={() => setShowAdmin(true)} className="bg-slate-900 text-slate-400 px-4 py-2 rounded-xl border border-slate-800 text-xs font-bold">⚙️ 管理</button>
          </header>

          <section className="relative w-full aspect-square bg-black overflow-hidden border-b border-slate-900 shadow-xl">
              <div id="reader" className="w-full h-full"></div>
              <div id="cam-gate" className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-950">
                  <button onClick={startScanner} className="bg-yellow-500 text-black px-12 py-5 rounded-2xl font-black text-xl shadow-[0_0_30px_rgba(234,179,8,0.2)] active:scale-95 transition-all">
                    📷 啟動掃描
                  </button>
              </div>
          </section>

          <section className="p-4 -mt-10 relative z-30">
              <div className="glass-card rounded-[32px] p-6 shadow-2xl">
                  
                  {/* 場域選擇 */}
                  <div className="flex flex-col gap-2 mb-4">
                      <div className="flex justify-between items-center ml-1">
                        <label className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">當前盤點場域</label>
                        <button onClick={toggleLocationComplete} className={`text-[10px] px-3 py-1.5 rounded-full font-bold transition-all shadow-sm ${completedLocations.includes(currentLocation) ? 'bg-emerald-500 text-black' : 'bg-slate-800 text-slate-300'}`}>
                          {completedLocations.includes(currentLocation) ? '✅ 已完成此區' : '⬜ 標記為完成'}
                        </button>
                      </div>
                      <select value={currentLocation} onChange={e => setCurrentLocation(e.target.value)} className="w-full bg-black border border-slate-700 text-yellow-500 text-sm px-4 py-3 rounded-2xl outline-none appearance-none">
                          {LOCATIONS.map(loc => <option key={loc} value={loc}>{completedLocations.includes(loc) ? '✅ ' : '📍 '}{loc}</option>)}
                      </select>
                      <div className="text-[10px] text-emerald-500 font-bold px-2 h-4">{feedback}</div>
                  </div>

                  {/* ✅ 修正：把品名顯示看板加回來了！ */}
                  <div className="text-center mb-6 border-b border-slate-800 pb-4">
                      <div className={`text-lg font-bold mb-1 ${currentItem ? 'text-white' : (scannedBarcode ? 'text-red-500' : 'text-slate-400')}`}>
                          {currentItem ? currentItem.name : (scannedBarcode ? '⚠️ 找不到此條碼' : '等待掃描...')}
                      </div>
                      <div className="text-xs text-yellow-600 font-mono tracking-widest uppercase">
                          {scannedBarcode ? `BC: ${scannedBarcode}` : 'BC: ---'}
                      </div>
                  </div>

                  {/* 輸入與確認區塊 */}
                  <div className="grid grid-cols-4 gap-3">
                      <input type="text" value={scannedBarcode} onChange={e => handleManualInput(e.target.value)} className="col-span-3 bg-black border border-slate-700 rounded-2xl p-4 text-white font-mono outline-none focus:border-yellow-500" placeholder="掃描或輸入條碼" />
                      <input type="number" value={qty} onChange={e => setQty(parseInt(e.target.value)||1)} className="col-span-1 bg-black border border-slate-700 rounded-2xl p-4 text-2xl font-black text-center text-yellow-500 outline-none" />
                      <button onClick={handleAddRecord} className="col-span-4 bg-gradient-to-br from-yellow-400 to-yellow-600 text-black py-5 rounded-2xl active:scale-95 text-xl font-bold shadow-lg">確認送出</button>
                  </div>
              </div>
          </section>

          <section className="p-4 flex-1 pb-32">
              <div className="flex justify-between items-center mb-4 px-2">
                  <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">歷史盤點清單</h2>
                  <div className="flex gap-3">
                      <button onClick={() => setShowSummary(true)} className="text-xs font-bold text-yellow-500 bg-yellow-500/10 px-3 py-1 rounded-lg">📊 各區總覽</button>
                  </div>
              </div>
              <div className="space-y-3">
                  {inventory.map((i, idx) => (
                    <div key={idx} className="glass-card p-4 rounded-3xl flex justify-between items-center shadow-sm">
                        <div className="flex-1 pr-4">
                            <div className="flex items-center gap-2 mb-1">
                                <span className="text-[8px] bg-yellow-500 text-black px-2 py-0.5 rounded font-bold">{i.location}</span>
                                <span className="font-bold text-slate-100 text-sm truncate w-40">{i.name}</span>
                            </div>
                            <div className="text-[10px] text-slate-500 font-mono mt-1">{i.barcode} • {i.time}</div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-xl font-black text-yellow-500">x{i.qty}</div>
                            <button onClick={() => { const newInv = [...inventory]; newInv.splice(idx, 1); setInventory(newInv); }} className="text-slate-600 text-2xl hover:text-red-500">&times;</button>
                        </div>
                    </div>
                  ))}
              </div>
          </section>

          <div className="fixed bottom-6 left-6 right-6 flex gap-3 z-[100]">
              <button onClick={() => { if(confirm("確定清空盤點數據？")) setInventory([]); }} className="bg-slate-900 border border-slate-800 text-slate-500 px-6 py-4 rounded-3xl text-[10px] font-bold">RESET</button>
              <div className="flex-1 bg-yellow-500 p-4 rounded-3xl flex justify-between items-center px-6 shadow-xl">
                  <span className="text-black font-bold text-xs">TOTAL ITEMS</span>
                  <span className="text-2xl font-black text-black leading-none">{inventory.reduce((a, b) => a + b.qty, 0)}</span>
                  <button onClick={() => {
                      let csv = "\ufeff場域,貨號,品名,條碼,數量,時間\n";
                      inventory.forEach(i => csv += `"${i.location}","${i.id}","${i.name}","${i.barcode}",${i.qty},"${i.time}"\n`);
                      const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
                      a.download = `Cupicho_Inv_${new Date().toISOString().slice(0,10)}.csv`; a.click();
                  }} className="ml-4 bg-black text-yellow-500 px-3 py-2 rounded-xl text-xs font-black shadow-md">匯出</button>
              </div>
          </div>

          {unknownBarcode && (
            <div className="modal-overlay">
                <div className="flex justify-between items-center mb-6">
                    <h3 className="text-xl font-bold text-white">⚠️ 條碼無對應資料</h3>
                    <button onClick={() => setUnknownBarcode(null)} className="text-slate-500 text-4xl">&times;</button>
                </div>
                <div className="bg-yellow-500/10 border border-yellow-500/30 p-4 rounded-2xl mb-6 text-center">
                    <p className="text-[10px] text-yellow-500 mb-1">掃描到的條碼</p>
                    <p className="text-2xl font-mono font-bold text-white">{unknownBarcode}</p>
                </div>
                
                <div className="bg-slate-900 p-5 rounded-3xl border border-slate-800 mb-4 shadow-lg">
                  <h4 className="text-emerald-400 font-bold mb-3 text-sm flex items-center gap-2"><span>✨</span> 選項 A：新增為全新商品</h4>
                  <input type="text" value={newProductName} onChange={e=>setNewProductName(e.target.value)} className="w-full bg-black border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-emerald-500 mb-3" placeholder="請輸入商品名稱"/>
                  <button onClick={bindNewProduct} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-md">✅ 確認新增並帶入</button>
                </div>

                <div className="bg-slate-900 p-5 rounded-3xl border border-slate-800 flex-1 flex flex-col min-h-0">
                  <h4 className="text-blue-400 font-bold mb-3 text-sm flex items-center gap-2"><span>🔍</span> 選項 B：尋找現有商品綁定</h4>
                  <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full bg-black border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-blue-500 mb-3" placeholder="搜尋主檔名稱..."/>
                  <div className="flex-1 overflow-y-auto space-y-2">
                    {searchQuery.length > 0 && masterData.filter(m => m.name.toLowerCase().includes(searchQuery.toLowerCase())).slice(0, 10).map(item => (
                      <div key={item.id} onClick={() => bindExisting(item)} className="bg-blue-900/30 p-4 rounded-xl border border-blue-500/20 flex justify-between items-center active:bg-blue-800">
                          <div><div className="font-bold text-white text-xs">{item.name}</div></div>
                          <span className="text-[10px] font-bold border border-blue-400 px-3 py-1 rounded-full text-blue-300">綁定</span>
                      </div>
                    ))}
                  </div>
                </div>
            </div>
          )}

          {showAdmin && (
            <div className="modal-overlay">
                <div className="flex justify-between items-center mb-6">
                    <h3 className="text-2xl font-bold text-white italic">⚙️ 系統設定</h3>
                    <button onClick={() => setShowAdmin(false)} className="text-slate-500 text-4xl">&times;</button>
                </div>
                
                <div className="bg-emerald-900/20 border border-emerald-500/30 p-6 rounded-[32px] mb-6 flex flex-col items-center">
                    <h4 className="text-emerald-500 font-bold mb-2 w-full text-left">📥 匯入新商品主檔 (CSV)</h4>
                    <p className="text-xs text-slate-400 mb-6 w-full text-left leading-relaxed">請上傳您的 "Barcode 20260306.csv"<br/>系統將自動更新為最新的 1,825 筆商品資料。</p>
                    
                    <input type="file" accept=".csv" ref={fileInputRef} style={{ display: 'none' }} onChange={handleImportCSV} />
                    <button onClick={triggerFileInput} className="bg-emerald-600 text-white w-full py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                        📁 點擊選擇 CSV 檔案
                    </button>
                </div>

                <button onClick={() => { if(confirm('⚠️ 確定清除所有設定與商品資料？')){localStorage.clear();location.reload();} }} className="text-red-900 text-xs font-bold py-4 mt-auto">重置所有系統快取</button>
            </div>
          )}
          
          {showSummary && (
            <div className="modal-overlay">
                <div className="flex justify-between items-center mb-6">
                    <h3 className="text-xl font-bold text-white italic">📊 各區盤點進度</h3>
                    <button onClick={() => setShowSummary(false)} className="text-slate-500 text-4xl">&times;</button>
                </div>
                <div className="flex-1 overflow-y-auto space-y-4">
                  {LOCATIONS.map(loc => {
                    const items = inventory.filter(i => i.location === loc);
                    const isDone = completedLocations.includes(loc);
                    if (items.length === 0 && !isDone) return null;
                    return (
                      <div key={loc} className={`border rounded-[24px] overflow-hidden ${isDone ? 'bg-emerald-900/10 border-emerald-800' : 'bg-slate-900 border-slate-800'}`}>
                          <div className={`px-5 py-3 flex justify-between items-center ${isDone ? 'bg-emerald-900/30' : 'bg-slate-800/80'}`}>
                            <span className={`font-bold ${isDone ? 'text-emerald-400' : 'text-yellow-500'}`}>{isDone ? '✅ ' : ''}{loc}</span>
                            <span className="text-[10px] text-slate-400 font-bold">小計 {items.length} 項</span>
                          </div>
                          <div className="p-2">
                            {items.map((i, idx) => (
                              <div key={idx} className="flex justify-between items-center text-xs p-3 border-b border-slate-800/50 last:border-0">
                                <span className="text-slate-300">{i.name}</span>
                                <span className="font-black text-yellow-500 bg-slate-950 px-2 py-1 rounded-lg">x{i.qty}</span>
                              </div>
                            ))}
                          </div>
                      </div>
                    )
                  })}
                  {inventory.length === 0 && <p className="text-center text-slate-500 mt-10">尚無盤點紀錄</p>}
                </div>
                <button onClick={() => setShowSummary(false)} className="mt-6 w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-lg">返回繼續盤點</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
